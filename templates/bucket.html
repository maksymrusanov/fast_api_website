<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — NIKE</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/bucket.css">
  </head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="/">NIK<span>E</span></a>
    <a class="nav-back" href="/">← Continue Shopping</a>
    <div class="nav-auth" id="nav-auth"></div>
  </nav>

  <!-- PAGE -->
  <div class="page">

    <!-- LEFT: items -->
    <div>
      <h1 class="section-heading">Your <span>Cart</span></h1>
      <div class="cart-items" id="cart-items"></div>
    </div>

    <!-- RIGHT: summary -->
    <aside class="summary">
      <h2>Order Summary</h2>
      <div class="summary-row"><span>Subtotal</span><span id="s-subtotal">$0</span></div>
      <div class="summary-row"><span>Shipping</span><span id="s-shipping">Free</span></div>
      <div class="summary-row"><span>Discount</span><span id="s-discount">—</span></div>
      <div class="summary-row total"><span>Total</span><span id="s-total">$0</span></div>

      <div class="promo-row">
        <input class="promo-input" id="promo-input" type="text" placeholder="Promo code" />
        <button class="promo-btn" id="promo-btn">Apply</button>
      </div>
      <p class="promo-msg" id="promo-msg"></p>

      <button class="checkout-btn" id="checkout-btn" disabled>Checkout</button>
    </aside>

  </div>

  <script>
    const PROMO_CODE = 'NIKE10';
    const DISCOUNT   = 0.10;
    const SHIPPING   = 0;

    let discountApplied = false;

    async function apiGet() {
      const res = await fetch('/api/cart');
      return res.json();
    }
    async function apiUpdateQty(id, qty) {
      await fetch(`/api/cart/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ qty })
      });
    }
    async function apiRemove(id) {
      await fetch(`/api/cart/${id}`, { method: 'DELETE' });
    }
    async function apiClear() {
      await fetch('/api/cart', { method: 'DELETE' });
    }

    async function changeQty(id, delta) {
      const cart = await apiGet();
      const item = cart.find(i => i.id === id);
      if (!item) return;
      if (item.qty + delta < 1) {
        await apiRemove(id);
      } else {
        await apiUpdateQty(id, item.qty + delta);
      }
      render();
    }
    async function removeItem(id) {
      await apiRemove(id);
      render();
    }

    async function render() {
      const cart      = await apiGet();
      const container = document.getElementById('cart-items');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🛒</div>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added anything yet.<br>Head back to the store and find your pair.</p>
            <a class="empty-link" href="/">Shop Now</a>
          </div>`;
        updateSummary(0);
        document.getElementById('checkout-btn').disabled = true;
        return;
      }

      container.innerHTML = cart.map(item => {
        const sub = item.price * item.qty;
        return `
          <div class="cart-item">
            <img class="cart-item-img" src="${item.img}" alt="${item.name}" />
            <div class="cart-item-info">
              <p class="cart-item-cat">Air Max</p>
              <p class="cart-item-name">${item.name}</p>
              <p class="cart-item-price">$${item.price} each</p>
            </div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, +1)">+</button>
            </div>
            <span class="cart-item-subtotal">$${sub}</span>
            <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">✕</button>
          </div>`;
      }).join('');

      const subtotal = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
      updateSummary(subtotal);
      document.getElementById('checkout-btn').disabled = false;
    }

    function updateSummary(subtotal) {
      const discount = discountApplied ? Math.round(subtotal * DISCOUNT) : 0;
      const total    = subtotal - discount + SHIPPING;
      document.getElementById('s-subtotal').textContent = `$${subtotal}`;
      document.getElementById('s-shipping').textContent = SHIPPING === 0 ? 'Free' : `$${SHIPPING}`;
      document.getElementById('s-discount').textContent = discount ? `-$${discount}` : '—';
      document.getElementById('s-total').textContent    = `$${total}`;
    }

    document.getElementById('promo-btn').addEventListener('click', async () => {
      const val = document.getElementById('promo-input').value.trim().toUpperCase();
      const msg = document.getElementById('promo-msg');
      if (val === PROMO_CODE) {
        discountApplied = true;
        msg.textContent = '✓ 10% discount applied!';
        msg.className   = 'promo-msg ok';
        document.getElementById('promo-input').disabled = true;
        document.getElementById('promo-btn').disabled   = true;
      } else {
        msg.textContent = 'Invalid promo code.';
        msg.className   = 'promo-msg err';
      }
      render();
    });

    document.getElementById('checkout-btn').addEventListener('click', async () => {
      await apiClear();
      discountApplied = false;
      alert('Thanks for your order! 🎉');
      render();
    });

    render();
  </script>

  <script id="auth-nav-script">
    (async () => {
      const auth = document.getElementById('nav-auth');
      if (!auth) return;
      try {
        const res  = await fetch('/api/auth/me');
        const data = await res.json();
        if (res.ok) {
          auth.innerHTML = `
            <span class="nav-user">Hi, <span>${data.username}</span></span>
            <button class="nav-btn logout" id="logout-btn">Logout</button>`;
          document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.reload();
          });
          return;
        }
      } catch {}
      auth.innerHTML = '<a class="nav-btn login" href="/login">Sign In</a>';
    })();
  </script>
</body>
</html>
