<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NIKE</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/auth.css">
  </head>
<body>
  <nav>
    <a class="nav-logo" href="/">NIK<span>E</span></a>
    <a class="nav-link" href="/">← Back to Store</a>
  </nav>

  <div class="center">
    <div class="card">
      <p class="card-logo">NIK<span>E</span></p>
      <p class="card-sub">Sign in to your account</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" id="pw-toggle" title="Show/hide password">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
        <div class="alert" id="alert"></div>
      </form>

      <div class="divider">or</div>
      <p class="switch">Don't have an account? <a href="/register">Create one</a></p>
    </div>
  </div>

  <script>
    // Password visibility toggle
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const alert = document.getElementById('alert');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      alert.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          alert.textContent = data.detail || 'Login failed.';
          alert.className = 'alert err';
          alert.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }
        alert.textContent = `✓ Welcome back, ${data.username}! Redirecting…`;
        alert.className = 'alert ok';
        alert.style.display = 'block';
        setTimeout(() => window.location.href = '/', 1000);
      } catch {
        alert.textContent = 'Network error. Please try again.';
        alert.className = 'alert err';
        alert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
