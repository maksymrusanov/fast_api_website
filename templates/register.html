<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — NIKE</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/auth.css">
  </head>
<body>
  <nav>
    <a class="nav-logo" href="/">NIK<span>E</span></a>
    <a class="nav-link" href="/">← Back to Store</a>
  </nav>

  <div class="center">
    <div class="card">
      <p class="card-logo">NIK<span>E</span></p>
      <p class="card-sub">Create your account</p>

      <form id="reg-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="JohnDoe" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Min 6 characters" required />
            <button type="button" class="pw-toggle" id="pw-toggle" title="Show/hide">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="field-hint" id="strength-label"></span>
        </div>
        <div class="field">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password" required />
          <span class="field-hint" id="confirm-hint"></span>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Create Account</button>
        <div class="alert" id="alert"></div>
      </form>

      <div class="divider">or</div>
      <p class="switch">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>

  <script>
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    // Password strength
    document.getElementById('password').addEventListener('input', () => {
      const val   = document.getElementById('password').value;
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '0%',   color: 'transparent', text: '' },
        { w: '25%',  color: '#e8172a',     text: 'Weak' },
        { w: '50%',  color: '#f97316',     text: 'Fair' },
        { w: '75%',  color: '#facc15',     text: 'Good' },
        { w: '100%', color: '#4ade80',     text: 'Strong' },
      ];
      const lvl = levels[Math.min(score, 4)];
      fill.style.width      = lvl.w;
      fill.style.background = lvl.color;
      label.textContent     = lvl.text;
      label.className = score < 2 ? 'field-hint err' : 'field-hint';
    });

    // Confirm match hint
    document.getElementById('confirm').addEventListener('input', () => {
      const hint = document.getElementById('confirm-hint');
      const match = document.getElementById('password').value === document.getElementById('confirm').value;
      hint.textContent = document.getElementById('confirm').value ? (match ? '✓ Passwords match' : '✗ Passwords do not match') : '';
      hint.className = 'field-hint' + (match ? '' : ' err');
    });

    document.getElementById('reg-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn      = document.getElementById('submit-btn');
      const alertEl  = document.getElementById('alert');
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        alertEl.textContent = 'Passwords do not match.';
        alertEl.className = 'alert err';
        alertEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';
      alertEl.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          alertEl.textContent = data.detail || 'Registration failed.';
          alertEl.className = 'alert err';
          alertEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }
        alertEl.textContent = `✓ Account created! Welcome, ${data.username}! Redirecting…`;
        alertEl.className = 'alert ok';
        alertEl.style.display = 'block';
        setTimeout(() => window.location.href = '/', 1200);
      } catch {
        alertEl.textContent = 'Network error. Please try again.';
        alertEl.className = 'alert err';
        alertEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
